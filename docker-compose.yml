version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_DB: beacon_buddy_api_development
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: ./beacon-buddy-api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/beacon_buddy_api_development
      REDIS_URL: redis://redis:6379
      RAILS_ENV: development
    depends_on:
      - postgres
      - redis
    volumes:
      - ./beacon-buddy-api:/app
    command: bundle exec rails s -b 0.0.0.0

volumes:
  postgres_data:
  redis_data:
